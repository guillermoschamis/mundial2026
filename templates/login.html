{% extends "base.html" %}
{% block content %}
<div style="max-width:380px; margin: 3rem auto;">
  <div style="text-align:center; margin-bottom:2rem;">
    <div style="font-size:3rem;">🏆</div>
    <h1 style="margin-bottom:.3rem;">Prode Mundial 2026</h1>
    <p style="color:#666; font-size:.9rem;">Iniciá sesión para jugar</p>
  </div>
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Usuario</label>
        <input type="text" name="nombre" required autofocus>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; margin-top:.5rem;">Entrar</button>
    </form>
    <p style="text-align:center; margin-top:1.2rem; font-size:.88rem; color:#666;">
      ¿No tenés cuenta? <a href="/registro" style="color:#c8a227;">Registrate</a>
    </p>
  </div>
</div>
{% endblock %}
